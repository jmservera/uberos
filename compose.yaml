# UbeROS - browser-accessible ROS development and simulation environment.
# Single command: `docker compose up`. The proxy is the only host-published port.
#
# Service boundaries follow the research report (docs/specs/01-Init-research.md):
#   discovery-server -> Fast DDS discovery (removes multicast dependency, RISK-4)
#   ros              -> ROS 2 middleware + rosbridge (:9090) + ttyd (:7681)
#   gazebo           -> headless `gz sim -s` + WebsocketServer (:9002), scene-
#                       state streamed to the browser gzweb client (Theme F, no VNC)
#   editor           -> code-server (:8443) on the shared ROS workspace
#   frontend         -> Svelte + Golden Layout SPA (:3000)
#   proxy            -> Nginx single ingress (:${UBEROS_PORT})

name: uberos

networks:
  ros_net:
    driver: bridge
  web_net:
    driver: bridge

volumes:
  ros-workspace:
  ros-home:
  gazebo-home:
  editor-data:
  # code-server machine/config dir (~/.config/code-server) — persists config
  # (e.g. config.yaml) separately from user-data so it survives restarts too.
  editor-config:
  # Server-side system settings store for the control service (Theme C). Keeps
  # config.json across restarts (FR-C2); the schema reserves a user key (FR-C4).
  control-data:

services:
  discovery-server:
    image: ros:${ROS_DISTRO:-kilted}-ros-base
    command: fastdds discovery -i 0 -l 0.0.0.0 -p 11811
    networks:
      - ros_net
    restart: unless-stopped
    # Fast DDS discovery listens on UDP 11811, so a TCP probe never succeeds.
    # Verify the discovery process is running instead.
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'fastdds discovery' >/dev/null || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  ros:
    build:
      context: ./services/ros
      args:
        ROS_DISTRO: ${ROS_DISTRO:-kilted}
    depends_on:
      discovery-server:
        condition: service_healthy
    environment:
      ROS_DOMAIN_ID: ${ROS_DOMAIN_ID:-42}
      RMW_IMPLEMENTATION: ${RMW_IMPLEMENTATION:-rmw_fastrtps_cpp}
      ROS_DISCOVERY_SERVER: discovery-server:11811
      FASTRTPS_DEFAULT_PROFILES_FILE: /etc/ros/dds_discovery.xml
    volumes:
      - ./workspace/src:/ros_ws/src
      - ros-workspace:/ros_ws
      - ros-home:/root/.ros
    networks:
      - ros_net
      - web_net
    stop_grace_period: 30s
    restart: unless-stopped
    # rosbridge (9090) and ttyd (7681) are intentionally NOT published to the host.
    # They are reachable only through the proxy (INV-04, WP-13 security baseline).
    # Use 127.0.0.1: `localhost` also resolves to ::1 (see /etc/hosts) but
    # rosbridge only listens on IPv4, so an IPv6 probe is refused.
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/127.0.0.1/9090' 2>/dev/null && echo ok || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # Gazebo simulator (PRD Theme F). Replaces the old `simulator` (Xvfb) + `vnc`
  # (x11vnc/noVNC sidecar) pair with a single headless container: `gz sim -s`
  # plus a gz-launch WebsocketServer (:9002) that streams the simulation as
  # SCENE STATE (protobuf over WebSocket) to the browser gzweb client, which
  # renders it client-side. No Xvfb, no VNC, no server GL — this removes the
  # software-render/pixel-scrape bottleneck and targets < 300ms interaction
  # (FR-F5). Gazebo is part of the default stack. The proxy still uses lazy
  # DNS for /gzweb/ws/ so
  # startup remains resilient if gazebo is temporarily unavailable (for example,
  # during restarts). On ros_net (DDS discovery, for the Theme E bridge) and
  # web_net (proxy). No host-published ports (INV-04, WP-13).
  gazebo:
    build:
      context: ./services/gazebo
      args:
        GZ_RELEASE: ${GZ_RELEASE:-ionic}
        ROS_DISTRO: ${ROS_DISTRO:-kilted}
    depends_on:
      discovery-server:
        condition: service_healthy
    environment:
      ROS_DOMAIN_ID: ${ROS_DOMAIN_ID:-42}
      RMW_IMPLEMENTATION: ${RMW_IMPLEMENTATION:-rmw_fastrtps_cpp}
      ROS_DISCOVERY_SERVER: discovery-server:11811
    volumes:
      - ./simulation:/simulation:ro
      - gazebo-home:/root/.gz
    networks:
      - ros_net
      - web_net
    stop_grace_period: 60s
    restart: unless-stopped
    # Verify the sim server is running AND the scene-state WebSocket accepts TCP
    # connections on 9002. A UDP/GL probe is unnecessary — the web view needs no
    # display. Uses bash /dev/tcp (no curl dependency in the Gazebo image).
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'gz sim' >/dev/null && bash -c 'echo > /dev/tcp/127.0.0.1/9002' 2>/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 25s

  # Turtlesim visualizer (PRD Theme C). A lightweight, ROS-native second
  # simulator: Xvfb + turtlesim_node + openbox + x11vnc + websockify in one
  # container, streamed to the browser over noVNC at /sim/turtlesim/novnc/.
  # Enabled in the default stack alongside Gazebo. On ros_net for the DDS
  # discovery server and web_net for the proxy. No host-published ports.
  turtlesim:
    build:
      context: ./services/turtlesim
      args:
        ROS_DISTRO: ${ROS_DISTRO:-kilted}
    depends_on:
      discovery-server:
        condition: service_healthy
    environment:
      DISPLAY: ":99"
      ROS_DOMAIN_ID: ${ROS_DOMAIN_ID:-42}
      RMW_IMPLEMENTATION: ${RMW_IMPLEMENTATION:-rmw_fastrtps_cpp}
      ROS_DISCOVERY_SERVER: discovery-server:11811
      FASTRTPS_DEFAULT_PROFILES_FILE: /etc/ros/dds_discovery.xml
    networks:
      - ros_net
      - web_net
    stop_grace_period: 30s
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:6080/ >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  editor:
    build:
      context: ./services/editor
    # The code-server image entrypoint already invokes the code-server binary,
    # so these are argument flags only (not prefixed with `code-server`).
    command: ["--bind-addr", "0.0.0.0:8443", "--auth", "none", "--disable-telemetry", "/ros_ws/src"]
    # Editor persistence (FR-D1/FR-D2): user-data, installed extensions, and VS
    # Code secret storage (which holds the GitHub Copilot login) all live under
    # ~/.local/share/code-server, so persisting it via `editor-data` keeps the
    # editor authenticated and configured across restarts. Machine/config state
    # (~/.config/code-server) persists via `editor-config`.
    # Future multi-user model (FR-D3): scope these per user, e.g. mount under
    # /data/users/<uid>/code-server so each user's data and Copilot token are
    # isolated instead of the current single shared coder home.
    # Secret handling (FR-D4): this iteration protects the token at rest only
    # via volume ownership/permissions (coder-owned volumes) and the fact that
    # the editor port is not host-published (access is routed via the proxy).
    # Token-at-rest encryption is REQUIRED before any multi-user or untrusted
    # network exposure — never commit tokens to the repo.
    volumes:
      - ./workspace/src:/ros_ws/src
      - editor-data:/home/coder/.local/share/code-server
      - editor-config:/home/coder/.config/code-server
    networks:
      - web_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/127.0.0.1/8443' 2>/dev/null && echo ok || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s

  frontend:
    build:
      context: ./services/frontend
      args:
        NPM_REGISTRY: ${NPM_REGISTRY:-https://registry.npmjs.org/}
    networks:
      - web_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:3000/ >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  control:
    build:
      context: ./services/control
    environment:
      # Compose project name used to scope Docker API queries (matches `name:`).
      UBEROS_PROJECT: ${COMPOSE_PROJECT_NAME:-uberos}
      # Services the system menu is allowed to restart (BR-007). The control
      # plane itself, the proxy, and discovery-server are intentionally excluded.
      UBEROS_SERVICES: ${UBEROS_SERVICES:-ros,gazebo,turtlesim,editor,frontend}
      # Surfaced to the SPA so it knows whether to show Logout (BR-008).
      UBEROS_AUTH: ${UBEROS_AUTH:-off}
      # Path to the persisted system settings store (Theme C, FR-C2). Lives on
      # the control-data named volume so settings survive container restarts.
      UBEROS_CONFIG_FILE: /data/config.json
    volumes:
      # Read/write access to the Docker socket to restart individual services.
      # The API surface is restricted to the allowlist above (see server.js).
      - /var/run/docker.sock:/var/run/docker.sock
      # Durable store for system settings (config.json). Persists across restarts.
      - control-data:/data
    networks:
      - web_net
    # Never host-published; reachable only through the proxy (INV-04, WP-13).
    restart: unless-stopped

  proxy:
    build:
      context: ./services/proxy
    environment:
      # Toggle proxy basic auth without code edits (BR-010, N-05).
      UBEROS_AUTH: ${UBEROS_AUTH:-off}
    depends_on:
      ros:
        condition: service_healthy
      editor:
        condition: service_healthy
      frontend:
        condition: service_healthy
      control:
        condition: service_healthy
    ports:
      - "${UBEROS_PORT:-8080}:8080"
    volumes:
      - ./services/proxy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./config/nginx:/etc/nginx/auth:ro
      # Self-hosted gzweb static client (Theme F, FR-F2), served by nginx at
      # /gzweb/. Mounted here (not baked into the gazebo image) so the panel
      # shell is ALWAYS available even when the default-enabled gazebo container is
      # down; only the /gzweb/ws/ upgrade returns 502 until gazebo is up.
      - ./services/gazebo/client:/usr/share/nginx/gzweb:ro
    networks:
      - web_net
      - ros_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:8080/healthz >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
