# GPU acceleration overlay for WSL2 (Windows host, Docker Desktop WSL2 backend).
# Usage: docker compose -f compose.yaml -f compose.override.wsl.yaml up
#
# WSL2 does NOT expose the GPU as a DRI device: there is no /dev/dri. Instead it
# exposes the DirectX kernel device /dev/dxg and ships the Windows GPU user-mode
# driver under /usr/lib/wsl. Gazebo's OGRE renderer reaches the GPU through
# Mesa's D3D12 (dozen) Gallium driver, which talks to /dev/dxg via libdxcore.
# This works for Intel, AMD, and NVIDIA on WSL2 alike (it is vendor-neutral),
# so it is the correct overlay on Windows instead of compose.override.intel.yaml
# (which needs /dev/dri and only exists on native Linux).
#
# Reference: Intel Community "Cannot get /dev/dri to appear in WSL 2" — the Intel
# moderator confirms WSL2 uses /dev/dxg, not /dev/dri (see
# docs/specs/03-intel-openvino-research.md, "WSL2 (Windows): /dev/dxg not /dev/dri").
#
# Requirements (host-specific):
#   - Windows 10/11 with WSL2 and a recent WSL kernel (`wsl --update`).
#   - Docker Desktop using the WSL2 backend (so /dev/dxg and /usr/lib/wsl exist
#     inside the docker VM). Native-Linux and macOS hosts must NOT load this
#     overlay — they have no /dev/dxg and should use the intel/nvidia overlay or
#     the default software path.
#   - The simulator image's Mesa must include the d3d12 Gallium driver
#     (d3d12_dri.so, shipped with Mesa >= 22 / current Ubuntu libgl1-mesa-dri).
#     If it is missing, rendering falls back to llvmpipe (software).
#
# ============================================================================
# PERFORMANCE WARNING (Theme E finding, 2026-07-19): this overlay makes Gazebo
# render on the GPU, but the simulator is delivered to the browser by SCREEN-
# SCRAPING a headless Xvfb framebuffer with x11vnc. On WSL2, GPU rendering forces
# a per-frame GPU->CPU pixel readback across the /dev/dxg paravirt boundary to
# get frames into that framebuffer, which is pathologically slow: interactive
# mouse-to-screen latency in the browser goes from ~1 s (software llvmpipe) to
# 20 s+ (GPU) — WORSE, not better. For the browser-delivered simulator, the base
# (software) path is recommended; this overlay is best reserved for compute or a
# future GPU-encode streaming path. Full analysis and measurement plan:
# docs/specs/04-gazebo-gpu-wsl2-research.md.
# ============================================================================

services:
  simulator:
    environment:
      # Disable software rendering so the Mesa D3D12 stack drives the GPU.
      LIBGL_ALWAYS_SOFTWARE: ""
      # Force the D3D12 (dozen) Gallium driver used for WSL2 GPU passthrough.
      GALLIUM_DRIVER: d3d12
      # Select the Intel adapter when multiple GPUs are present (optional; drop
      # or change to match AMD/NVIDIA). Matches on a substring of the adapter name.
      MESA_D3D12_DEFAULT_ADAPTER_NAME: ${UBEROS_WSL_ADAPTER:-Intel}
      # WSL mounts the Windows driver libs here; put them on the loader path.
      # ROS's setup.bash appends to (never replaces) LD_LIBRARY_PATH, so this
      # entry is preserved after the workspace is sourced at runtime.
      LD_LIBRARY_PATH: /usr/lib/wsl/lib
      #
      # --- Theme E spike fallback (WSL-only, OPT-IN, currently disabled) -------
      # If `glxinfo -B` still reports `llvmpipe` on this host, Gazebo's default
      # ogre2 render engine is likely outrunning Mesa's d3d12 (dozen) GL coverage
      # on WSL2. The recommended first remediation is to force the older `ogre`
      # (OGRE 1.x) engine, whose GL requirements dozen is far more likely to
      # satisfy. See docs/specs/04-gazebo-gpu-wsl2-research.md.
      #
      # Option 1 — force the `ogre` engine on the gz sim command line. The base
      # simulator entrypoint runs `gz sim --verbose 1 "${WORLD}"`; to apply this
      # fallback, override the service command on this overlay so the render
      # engine is `ogre` instead of the default `ogre2`, e.g.:
      #
      #   command: ["gz", "sim", "--verbose", "1", "--render-engine", "ogre",
      #             "/simulation/worlds/uberos_default.sdf"]
      #
      # (place `command:` under this `simulator:` service, not under environment).
      #
      # Option 2 — combine with a GL version override for the D3D12 path. The
      # base compose pins MESA_GL_VERSION_OVERRIDE=3.3 for the software path;
      # on dozen this can cap the reported GL version. Raise or clear it here:
      #
      #   MESA_GL_VERSION_OVERRIDE: "4.6"
      #   MESA_GLSL_VERSION_OVERRIDE: "460"
      # ------------------------------------------------------------------------
    # The DirectX kernel device is how WSL2 exposes the GPU (there is no /dev/dri).
    devices:
      - /dev/dxg:/dev/dxg
    # The Windows user-mode GPU driver (libdxcore.so, libd3d12.so, ...) lives on
    # the host under /usr/lib/wsl; mount it read-only so libdxcore can enumerate
    # the adapter. No render/video group_add is needed: /dev/dxg is world-usable.
    volumes:
      - /usr/lib/wsl:/usr/lib/wsl:ro
