name: CI — Integration & Acceptance
# UbeROS project CI — heavyweight live integration gate. Builds the images,
# starts the full Docker Compose stack, waits for healthy services, runs smoke
# tests + the ROS graph check, and executes the CI-enabled Playwright
# acceptance slice.
#
# Unlike ci.yml (lint + build, runs for ANY PR), this workflow ONLY runs on the
# protected/preview branches — PRs targeting dev/preview/main/insider and pushes
# to dev/main/insider. Arbitrary PRs to feature branches do NOT pay this cost;
# the fast lint+build gate in ci.yml covers those.
#
# GitHub Actions workflows don't share state, so this workflow builds the images
# itself (docker compose build) before starting the stack — it does not rely on
# the build job in ci.yml.
# Separated from squad-ci.yml (managed by squad-cli) so squad upgrades don't
# overwrite project-specific checks.

on:
  pull_request:
    branches: [dev, preview, main, insider]
    types: [opened, synchronize, reopened]
  push:
    branches: [dev, main, insider]

permissions:
  contents: read
jobs:
  # ── Build images, start the stack, run smoke + acceptance ──────────────
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate compose config
        run: docker compose config --quiet

      - name: Build images
        run: docker compose build

      - name: Start services
        run: docker compose up --detach

      - name: Wait for healthy services
        run: |
          timeout 180 bash -c '
            set -euo pipefail
            while docker compose ps --format "{{.Service}} {{.State}} {{.Health}}" \
              | grep -Eq "exited|dead|restarting|starting|unhealthy"; do
              sleep 5
            done
          '

      # ── Smoke tests ──────────────────────────────────────────────────
      - name: Smoke test — service health + proxy routing
        run: bash tests/smoke.sh

      - name: Smoke test — ROS graph
        run: >
          docker compose exec -T ros bash -lc
          "source /opt/ros/\$ROS_DISTRO/setup.bash && ros2 node list"

      # ── Playwright acceptance tests (core + expanded integration slice) ──
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.19

      - name: Install test dependencies
        working-directory: tests
        run: npm ci

      - name: Install Playwright browsers and Linux deps
        working-directory: tests
        run: npx playwright install --with-deps chromium

      - name: Run acceptance tests (S1 + S2 + S3 + S4 + S5 + S5b + S7 + S9)
        working-directory: tests
        run: >
          npm test --
          --grep-invert "ROS Status: pop out -> click pop-in button -> docks back visibly"
          acceptance/s1-stack-health.spec.js
          acceptance/s2-window-manager.spec.js
          acceptance/s3-terminal-ros.spec.js
          acceptance/s4-novnc-frame.spec.js
          acceptance/s5-popout-isolation.spec.js
          acceptance/s5b-popout-dockback.spec.js
          acceptance/s7-system-menu.spec.js
          acceptance/s9-service-reset.spec.js

      # Remaining browser-only coverage stays out of CI for now:
      # S6 exercises editor file persistence and S8 covers auth toggle modes.
      # The ROS Status pop-in subcase in S5b is temporarily excluded due to
      # teardown flakiness on long CI runs; other S5b panel cases still run.

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: tests/playwright-report/
          retention-days: 14

      - name: Upload Playwright traces
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: tests/test-results/
          retention-days: 14

      - name: Teardown
        if: always()
        run: docker compose down -v
