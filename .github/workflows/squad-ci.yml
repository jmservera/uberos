name: Squad CI
# UbeROS: validates and builds the Docker Compose stack, then smoke-tests ROS.

on:
  pull_request:
    branches: [dev, preview, main, insider]
    types: [opened, synchronize, reopened]
  push:
    branches: [dev, insider]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate compose config
        run: docker compose config --quiet

      - name: Build images
        run: docker compose build

      - name: Start services
        run: docker compose up --detach

      - name: Wait for healthy services
        run: |
          timeout 180 bash -c '
            while docker compose ps --format "{{.Service}} {{.Health}}" \
              | grep -E "starting|unhealthy" >/dev/null; do
              sleep 5
            done
          '

      - name: Smoke test - ROS graph
        run: docker compose exec -T ros bash -lc "source /opt/ros/\$ROS_DISTRO/setup.bash && ros2 node list"

      - name: Teardown
        if: always()
        run: docker compose down -v
