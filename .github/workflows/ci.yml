name: CI
# UbeROS project CI: Dockerfile linting, smoke tests, and Playwright acceptance
# checks. Separated from squad-ci.yml (managed by squad-cli) so squad upgrades
# don't overwrite project-specific checks.

on:
  pull_request:
    branches: [dev, preview, main, insider]
    types: [opened, synchronize, reopened]
  push:
    branches: [dev, main, insider]

permissions:
  contents: read
jobs:
  # ── Job 1: Fast feedback — no Docker build required ────────────────────
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install hadolint
        run: |
          curl -sL -o /tmp/hadolint \
            https://github.com/hadolint/hadolint/releases/download/v2.12.0/hadolint-Linux-x86_64
          EXPECTED=$(curl -sL \
            https://github.com/hadolint/hadolint/releases/download/v2.12.0/hadolint-Linux-x86_64.sha256 \
            | awk '{print $1}')
          echo "$EXPECTED  /tmp/hadolint" | sha256sum -c -
          sudo install -m 0755 /tmp/hadolint /usr/local/bin/hadolint

      - name: Lint Dockerfiles
        run: |
          # DL3008 (pin versions) and DL3013 (pip pin) are noisy across these images
          # because distro/package installs are intentionally unpinned in CI builds.
          fail=0
          for df in services/*/Dockerfile; do
            echo "== $df =="
            if ! hadolint --ignore DL3008 --ignore DL3013 "$df"; then
              fail=1
            fi
          done
          exit $fail

      - name: Lint shell scripts (shellcheck)
        run: |
          command -v shellcheck >/dev/null 2>&1 || (sudo apt-get update && sudo apt-get install -y shellcheck)
          shellcheck --severity=warning \
            services/ros/uberos-term.sh \
            services/ros/entrypoint.sh \
            services/vnc/entrypoint.sh \
            services/simulator/entrypoint.sh \
            tests/smoke.sh

      - name: Set up Node.js for linting
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Lint JavaScript (ESLint)
        run: |
          npm init -y > /dev/null 2>&1
          npm install --no-save eslint@8 > /dev/null 2>&1
          npx eslint --no-eslintrc \
            --env browser,node,es2022 \
            --parser-options=ecmaVersion:2022,sourceType:module \
            --rule '{"no-undef":"off","no-unused-vars":"warn"}' \
            'services/frontend/src/**/*.js' \
            'services/frontend/*.config.js' \
            'services/control/server.js' \
            'tests/**/*.js'

      - name: Lint CSS (stylelint)
        run: |
          npm install --no-save stylelint@16 stylelint-config-standard@36 > /dev/null 2>&1
          npx stylelint --config '{"extends":"stylelint-config-standard"}' \
            'services/frontend/src/**/*.css'

  # ── Job 2: Build images, start the stack, run smoke + acceptance ───────
  build-and-test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Validate compose config
        run: docker compose config --quiet

      - name: Build images
        run: docker compose build

      - name: Start services
        run: docker compose up --detach

      - name: Wait for healthy services
        run: |
          timeout 180 bash -c '
            set -euo pipefail
            while docker compose ps --format "{{.Service}} {{.State}} {{.Health}}" \
              | grep -Eq "exited|dead|restarting|starting|unhealthy"; do
              sleep 5
            done
          '

      # ── Smoke tests ──────────────────────────────────────────────────
      - name: Smoke test — service health + proxy routing
        run: bash tests/smoke.sh

      - name: Smoke test — ROS graph
        run: >
          docker compose exec -T ros bash -lc
          "source /opt/ros/\$ROS_DISTRO/setup.bash && ros2 node list"

      # ── Playwright acceptance tests (S1–S2) ──────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install test dependencies
        working-directory: tests
        run: npm ci

      - name: Install Playwright browsers
        working-directory: tests
        run: npx playwright install --with-deps chromium

      - name: Run acceptance tests (S1 + S2)
        working-directory: tests
        run: >
          npx playwright test
          acceptance/s1-stack-health.spec.js
          acceptance/s2-window-manager.spec.js

      # S3–S9 are integration-heavy (terminal I/O, VNC pixel analysis, service
      # restarts). They run locally but are not yet enabled in CI. To add them
      # later, append more spec paths to the command above.

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: tests/playwright-report/
          retention-days: 14

      - name: Upload Playwright traces
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: tests/test-results/
          retention-days: 14

      - name: Teardown
        if: always()
        run: docker compose down -v
