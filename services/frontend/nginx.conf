# Static file server for the UbeROS frontend SPA, listening on :3000.
# The outer UbeROS proxy routes browser traffic here; this server only serves
# the compiled single-page application with SPA history fallback.
server {
    listen 3000;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }
}
