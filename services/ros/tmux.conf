set -g mouse on
set -g history-limit 100000
set -s set-clipboard on

# Let standard Page Up / Page Down keys browse tmux scrollback without the
# prefix while still passing keys through to interactive apps outside copy mode.
bind-key -n PPage if-shell -F '#{pane_in_mode}' 'send-keys -X page-up' 'if-shell -F "#{alternate_on}" "send-keys PPage" "copy-mode -eu"'
bind-key -n NPage if-shell -F '#{pane_in_mode}' 'send-keys -X page-down' 'send-keys NPage'
bind-key -T copy-mode PPage send-keys -X page-up
bind-key -T copy-mode NPage send-keys -X page-down
bind-key -T copy-mode-vi PPage send-keys -X page-up
bind-key -T copy-mode-vi NPage send-keys -X page-down

# Mouse wheel: scroll tmux history in normal mode, pass through in alternate
# screen apps, and keep scrolling while already in copy mode.
bind-key -n WheelUpPane if-shell -F '#{pane_in_mode}' 'send-keys -X scroll-up' 'if-shell -F "#{alternate_on}" "send-keys -M" "copy-mode -e \; send-keys -X scroll-up"'
bind-key -n WheelDownPane if-shell -F '#{pane_in_mode}' 'send-keys -X scroll-down' 'send-keys -M'

# Mouse drag starts selection in copy mode and copies on release.
bind-key -n MouseDrag1Pane if-shell -F '#{pane_in_mode}' 'send-keys -M' 'copy-mode -M'
bind-key -T copy-mode MouseDragEnd1Pane send-keys -X copy-selection-and-cancel
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-selection-and-cancel

# Right-click pastes the most recent tmux buffer into the current pane.
bind-key -n MouseDown3Pane paste-buffer -p
