<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>UbeROS — Gazebo (gzweb)</title>
    <style>
      /* Fills the Golden Layout iframe panel (FR-F3); dark to match the SPA. */
      html,
      body {
        margin: 0;
        height: 100%;
        background: #1e1e1e;
        color: #d4d4d4;
        font: 13px/1.5 system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      }
      #app {
        position: relative;
        height: 100%;
      }
      /* gzweb's SceneManager mounts its Three.js <canvas> into #scene. It sizes
         the renderer to this element's clientWidth/clientHeight, so #scene must
         fill the panel. */
      #scene {
        position: absolute;
        inset: 0;
        overflow: hidden;
      }
      #scene canvas {
        display: block;
      }
      /* Status readout floats above the 3D canvas as a small overlay so the
         canvas keeps the whole panel (FR-F3). pointer-events:none lets mouse
         drags reach the OrbitControls underneath. */
      header {
        position: absolute;
        top: 8px;
        left: 8px;
        z-index: 2;
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 5px 9px;
        border-radius: 6px;
        background: rgba(37, 37, 38, 0.82);
        border: 1px solid #333;
        pointer-events: none;
      }
      .dot {
        width: 9px;
        height: 9px;
        border-radius: 50%;
        background: #c0a000;
        flex: none;
      }
      .dot.ok {
        background: #2ea043;
      }
      .dot.err {
        background: #d13438;
      }
      header strong {
        color: #fff;
      }
      header .meta {
        color: #9a9a9a;
        font-variant-numeric: tabular-nums;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="scene"></div>
      <header>
        <span id="dot" class="dot" aria-hidden="true"></span>
        <strong>Gazebo</strong>
        <span id="state">connecting…</span>
        <span class="meta" id="meta"></span>
      </header>
    </div>
    <!-- app.js imports config.js first (side effect: window.GZWEB_WS_URL). -->
    <script type="module" src="./app.js"></script>
  </body>
</html>
