# Static file server for the BUILT gzweb 3D client. The reverse proxy forwards
# /gzweb/ here unchanged; assets were built with Vite base '/gzweb/' so requests
# map 1:1 onto /usr/share/nginx/html/gzweb. Unknown deep paths fall back to the
# client's index.html. No host-published port (INV-04); reachable only via the
# proxy on web_net.
server {
    listen 3000;
    root /usr/share/nginx/html;

    # Container health check target (never a real asset path).
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    location /gzweb/ {
        try_files $uri /gzweb/index.html;
    }
}
