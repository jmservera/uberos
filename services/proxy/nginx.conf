# UberOS reverse proxy - the single ingress for all browser traffic (INV-04).
# Routes the SPA, rosbridge, noVNC, editor, and terminal behind one origin so
# iframe panels share an origin (I-12) and backend ports stay internal (WP-13).

upstream frontend {
    server frontend:3000;
}

upstream rosbridge {
    server ros:9090;
}

upstream novnc {
    # The vnc sidecar shares the simulator network namespace, so noVNC is
    # reachable on the simulator hostname.
    server simulator:6080;
}

upstream editor {
    server editor:8443;
}

upstream terminal {
    server ros:7681;
}

# Map the Upgrade header so WebSocket connections are proxied correctly.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 8080;
    server_name _;

    # Lightweight health endpoint for the container health check.
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    # Frontend single-page application (window manager canvas).
    location / {
        proxy_pass         http://frontend;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # rosbridge WebSocket (browser <-> ROS graph).
    location /ros {
        # Enable before non-localhost exposure (NFR N-05):
        # auth_basic           "UberOS";
        # auth_basic_user_file /etc/nginx/auth/.htpasswd;

        proxy_pass         http://rosbridge/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection $connection_upgrade;
        proxy_set_header   Host $host;
        proxy_read_timeout 3600s;
    }

    # noVNC stream of the simulator GUI.
    location /novnc {
        proxy_pass         http://novnc/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection $connection_upgrade;
        proxy_set_header   Host $host;
        proxy_read_timeout 3600s;
        proxy_buffering    off;
    }

    # code-server editor. code-server emits relative asset URLs and a relative
    # login redirect ("./?folder=..."), so it works under the /editor/ subpath
    # as long as nginx does not rewrite that redirect. proxy_redirect off keeps
    # the relative Location intact (the default would mangle it to "./../",
    # bouncing the iframe back to the SPA at "/"). A bare /editor is redirected
    # to /editor/ so the relative paths resolve against the subpath.
    location = /editor {
        return 301 /editor/;
    }

    location /editor/ {
        proxy_pass         http://editor/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection $connection_upgrade;
        # code-server rejects the workbench WebSocket with 403 when the Origin
        # host (localhost:8080) does not match the forwarded Host. $host drops
        # the port, so forward $http_host to preserve "host:port" and pass the
        # origin check (otherwise the workbench fails with WebSocket close 1006).
        proxy_set_header   Host $http_host;
        proxy_set_header   Accept-Encoding gzip;
        proxy_redirect     off;
        proxy_read_timeout 3600s;
    }

    # ttyd browser terminals.
    location /terminal {
        proxy_pass         http://terminal/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection $connection_upgrade;
        proxy_set_header   Host $host;
        proxy_read_timeout 3600s;
    }
}
