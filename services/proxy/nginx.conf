# UbeROS reverse proxy - the single ingress for all browser traffic (INV-04).
# Routes the SPA, rosbridge, noVNC, editor, and terminal behind one origin so
# iframe panels share an origin (I-12) and backend ports stay internal (WP-13).

upstream frontend {
    server frontend:3000;
}

upstream rosbridge {
    server ros:9090;
}

upstream novnc {
    # The vnc sidecar shares the simulator network namespace, so noVNC is
    # reachable on the simulator hostname.
    server simulator:6080;
}

upstream editor {
    server editor:8443;
}

upstream terminal {
    server ros:7681;
}

upstream control {
    # Operational control plane (per-service restart, workspace config).
    server control:9000;
}

# Map the Upgrade header so WebSocket connections are proxied correctly.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 8080;
    server_name _;

    # Optional basic auth, toggled by UBEROS_AUTH in .env with no code edits
    # (BR-010). The entrypoint script generates this include at container start:
    # `auth_basic` directives when UBEROS_AUTH=basic, or `auth_basic off;` when
    # disabled. Applied at server scope so every proxied route (SPA + all
    # WebSocket routes: rosbridge, noVNC, ttyd, control) is protected uniformly.
    include /etc/nginx/uberos/auth.conf;

    # Lightweight health endpoint for the container health check. Never gated by
    # auth, otherwise the healthcheck would fail whenever auth is enabled.
    location = /healthz {
        auth_basic off;
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    # Logout (BR-008). Returns 401 with a fresh realm so the browser drops the
    # cached basic-auth credentials and re-prompts on the next request. The
    # frontend navigates here only when auth is enabled.
    location = /logout {
        auth_basic off;
        add_header WWW-Authenticate 'Basic realm="UbeROS logout"' always;
        add_header Content-Type text/plain always;
        return 401 "Logged out. Sign in again to continue.\n";
    }

    # Operational control plane (per-service restart + workspace config), routed
    # through the single ingress like every other backend. The trailing slash
    # strips the /control/ prefix so the control service sees /config, /services,
    # /services/{name}/restart.
    location /control/ {
        proxy_pass         http://control/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Frontend single-page application (window manager canvas).
    location / {
        proxy_pass         http://frontend;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # rosbridge WebSocket (browser <-> ROS graph). Auth (when enabled) is applied
    # at server scope above, so it covers this WebSocket route too (N-05).
    location /ros {
        proxy_pass         http://rosbridge/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection $connection_upgrade;
        proxy_set_header   Host $host;
        proxy_read_timeout 3600s;
    }

    # noVNC stream of the simulator GUI.
    location /novnc {
        proxy_pass         http://novnc/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection $connection_upgrade;
        proxy_set_header   Host $host;
        proxy_read_timeout 3600s;
        proxy_buffering    off;
    }

    # code-server editor. code-server emits relative asset URLs and a relative
    # login redirect ("./?folder=..."), so it works under the /editor/ subpath
    # as long as nginx does not rewrite that redirect. proxy_redirect off keeps
    # the relative Location intact (the default would mangle it to "./../",
    # bouncing the iframe back to the SPA at "/"). A bare /editor is redirected
    # to /editor/ so the relative paths resolve against the subpath.
    location = /editor {
        return 301 /editor/;
    }

    location /editor/ {
        proxy_pass         http://editor/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection $connection_upgrade;
        # code-server rejects the workbench WebSocket with 403 when the Origin
        # host (localhost:8080) does not match the forwarded Host. $host drops
        # the port, so forward $http_host to preserve "host:port" and pass the
        # origin check (otherwise the workbench fails with WebSocket close 1006).
        proxy_set_header   Host $http_host;
        proxy_set_header   Accept-Encoding gzip;
        proxy_redirect     off;
        proxy_read_timeout 3600s;
    }

    # ttyd browser terminals.
    location /terminal {
        proxy_pass         http://terminal/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection $connection_upgrade;
        proxy_set_header   Host $host;
        proxy_read_timeout 3600s;
    }
}
