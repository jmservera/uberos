# UbeROS reverse proxy - the single ingress for all browser traffic (INV-04).
# Routes the SPA, rosbridge, the gzweb scene-state stream, editor, and terminal
# behind one origin so iframe panels share an origin (I-12) and backend ports
# stay internal (WP-13).

upstream frontend {
    server frontend:3000;
}

upstream rosbridge {
    server ros:9090;
}

# NOTE: gazebo is deliberately NOT declared as a static upstream. It is an
# on-demand service (compose `simulators` profile) that may be stopped when the
# proxy starts. A static `upstream { server gazebo:9002; }` is resolved at
# config load and makes nginx fail to boot when the container is absent. The
# /gzweb/ws/ location below uses Docker's embedded DNS resolver (127.0.0.11)
# with a variable in proxy_pass so the name is resolved lazily at request time:
# the proxy always starts, and the WebSocket returns 502 only while gazebo is
# not running. The static gzweb client at /gzweb/ is served by the always-on
# gzweb-client service (a static upstream), so the panel shell loads even when
# the on-demand gazebo container is down.

# NOTE: turtlesim is deliberately NOT declared as a static upstream. It is an
# on-demand service (compose `simulators` profile) that may be stopped when the
# proxy starts. A static `upstream { server turtlesim:6080; }` is resolved at
# config load and makes nginx fail to boot when the container is absent. The
# /sim/turtlesim/novnc/ location below uses Docker's embedded DNS resolver
# (127.0.0.11) with a variable in proxy_pass so the name is resolved lazily at
# request time: the proxy always starts, and requests return 502 only while
# turtlesim is not running.

upstream editor {
    server editor:8443;
}

upstream terminal {
    server ros:7681;
}

upstream control {
    # Operational control plane (per-service restart, workspace config).
    server control:9000;
}

upstream gzweb_client {
    # Built gzweb 3D client (static assets). Always-on (no compose profile), so
    # unlike gazebo/turtlesim a static upstream is safe: the container is present
    # whenever the proxy is up. This serves the /gzweb/ panel shell so it loads
    # even while the on-demand gazebo container (the /gzweb/ws/ backend) is down.
    server gzweb-client:3000;
}

# Map the Upgrade header so WebSocket connections are proxied correctly.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 8080;
    server_name _;

    # Optional basic auth, toggled by UBEROS_AUTH in .env with no code edits
    # (BR-010). The entrypoint script generates this include at container start:
    # `auth_basic` directives when UBEROS_AUTH=basic, or `auth_basic off;` when
    # disabled. Applied at server scope so every proxied route (SPA + all
    # WebSocket routes: rosbridge, noVNC, ttyd, control) is protected uniformly.
    include /etc/nginx/uberos/auth.conf;

    # Lightweight health endpoint for the container health check. Never gated by
    # auth, otherwise the healthcheck would fail whenever auth is enabled.
    location = /healthz {
        auth_basic off;
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    # Logout (BR-008). Returns 401 with a fresh realm so the browser drops the
    # cached basic-auth credentials and re-prompts on the next request. The
    # frontend navigates here only when auth is enabled.
    location = /logout {
        auth_basic off;
        add_header WWW-Authenticate 'Basic realm="UbeROS logout"' always;
        add_header Content-Type text/plain always;
        return 401 "Logged out. Sign in again to continue.\n";
    }

    # Operational control plane (per-service restart + workspace config), routed
    # through the single ingress like every other backend. The trailing slash
    # strips the /control/ prefix so the control service sees /config, /services,
    # /services/{name}/restart.
    location /control/ {
        proxy_pass         http://control/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Frontend single-page application (window manager canvas).
    location / {
        proxy_pass         http://frontend;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # rosbridge WebSocket (browser <-> ROS graph). Auth (when enabled) is applied
    # at server scope above, so it covers this WebSocket route too (N-05).
    location /ros {
        proxy_pass         http://rosbridge/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection $connection_upgrade;
        proxy_set_header   Host $host;
        proxy_read_timeout 3600s;
    }

    # noVNC stream of the Turtlesim GUI (PRD Theme C, FR-C2). Same style as the
    # gzweb WebSocket below but for the on-demand `turtlesim` service. The upstream is resolved
    # lazily via Docker's embedded DNS (127.0.0.11) so the proxy still boots when
    # turtlesim is not running. Because proxy_pass uses a variable, nginx does
    # NOT auto-strip the location prefix (that only happens for static upstreams
    # with a URI), so an explicit rewrite maps /sim/turtlesim/novnc/<x> -> /<x>
    # and websockify sees "/" for its assets and WebSocket.
    location /sim/turtlesim/novnc/ {
        resolver           127.0.0.11 valid=10s;
        set $turtlesim     turtlesim:6080;
        rewrite            ^/sim/turtlesim/novnc/(.*)$ /$1 break;
        proxy_pass         http://$turtlesim;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection $connection_upgrade;
        proxy_set_header   Host $host;
        proxy_read_timeout 3600s;
        proxy_buffering    off;
    }

    # Gazebo web visualization (PRD Theme F). Two routes replace the retired
    # /novnc Gazebo pixel stream:
    #
    #   /gzweb/     -> the built gzweb 3D client (Three.js), served by the
    #                  always-on gzweb-client service so the panel shell loads
    #                  even when the on-demand gazebo container is down.
    #   /gzweb/ws/  -> the Gazebo gz-launch WebsocketServer (gazebo:9002), which
    #                  streams the simulation as SCENE STATE (protobuf) to the
    #                  client. Resolved lazily via Docker's embedded DNS so the
    #                  proxy still boots when gazebo is stopped.
    #
    # A bare /gzweb redirects to /gzweb/ so the client's built asset URLs
    # (base '/gzweb/') resolve against the subpath.
    location = /gzweb {
        return 301 /gzweb/;
    }

    # The gzweb-client image builds with Vite base '/gzweb/' and serves the
    # assets under that same path, so the prefix is passed through unchanged
    # (no rewrite): a request for /gzweb/assets/x.js maps 1:1 upstream.
    location /gzweb/ {
        proxy_pass         http://gzweb_client;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # WebSocket upgrade to the scene-state server. Because proxy_pass uses a
    # variable, nginx does NOT auto-strip the location prefix, so an explicit
    # rewrite maps /gzweb/ws/<x> -> /<x> and the WebsocketServer sees "/".
    location /gzweb/ws/ {
        resolver           127.0.0.11 valid=10s;
        set $gazebo        gazebo:9002;
        rewrite            ^/gzweb/ws/(.*)$ /$1 break;
        proxy_pass         http://$gazebo;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection $connection_upgrade;
        proxy_set_header   Host $host;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_buffering    off;
    }

    # code-server editor. code-server emits relative asset URLs and a relative
    # login redirect ("./?folder=..."), so it works under the /editor/ subpath
    # as long as nginx does not rewrite that redirect. proxy_redirect off keeps
    # the relative Location intact (the default would mangle it to "./../",
    # bouncing the iframe back to the SPA at "/"). A bare /editor is redirected
    # to /editor/ so the relative paths resolve against the subpath.
    location = /editor {
        return 301 /editor/;
    }

    location /editor/ {
        proxy_pass         http://editor/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection $connection_upgrade;
        # code-server rejects the workbench WebSocket with 403 when the Origin
        # host (localhost:8080) does not match the forwarded Host. $host drops
        # the port, so forward $http_host to preserve "host:port" and pass the
        # origin check (otherwise the workbench fails with WebSocket close 1006).
        proxy_set_header   Host $http_host;
        proxy_set_header   Accept-Encoding gzip;
        proxy_redirect     off;
        proxy_read_timeout 3600s;
    }

    # ttyd browser terminals.
    location /terminal {
        proxy_pass         http://terminal/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection $connection_upgrade;
        proxy_set_header   Host $host;
        proxy_read_timeout 3600s;
    }
}
